# separate terms of service, privacy policy, and support
# documentation.

name: Elixir CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Run tests
        run: mix test

  dashboard-e2e:
    name: Dashboard e2e
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir/e2e

    steps:
      - uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: elixir/e2e/package-lock.json

      - name: Restore Elixir deps and build cache
        uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir dependencies
        working-directory: elixir
        run: mix deps.get

      - name: Install e2e dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run dashboard e2e
        run: npx playwright test
