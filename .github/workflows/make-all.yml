name: make-all

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  make-all:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Verify make all
        run: make all

  dashboard-e2e:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up mise tools
        uses: jdx/mise-action@v3
        with:
          install: true
          cache: true
          working_directory: elixir

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache deps and build
        uses: actions/cache@v4
        with:
          path: |
            elixir/deps
            elixir/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-mix-

      - name: Install Elixir deps
        run: mix deps.get

      - name: Install e2e dependencies
        run: npm install
        working-directory: elixir/e2e

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: elixir/e2e

      - name: Run dashboard e2e suite
        run: npm test
        working-directory: elixir/e2e
